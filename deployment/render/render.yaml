services:
  - type: web
    name: finflow-backend
    env: python
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: finflow-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production

databases:
  - name: finflow-db
    databaseName: finflow
    user: finflow
    plan: free

  - name: finflow-redis
    plan: free
    type: redis
